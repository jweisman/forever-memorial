services:
  postgres:
    image: postgres:16-alpine
    container_name: forever-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: forever
      POSTGRES_PASSWORD: forever_dev
      POSTGRES_DB: forever
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: forever-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Creates the default S3 bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/forever-uploads --ignore-existing;
      exit 0;
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: forever-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data:
